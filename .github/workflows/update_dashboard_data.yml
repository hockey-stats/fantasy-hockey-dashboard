name: Update Data for Free Agency Dashboard
on:
  workflow_dispatch:
  push:
    branches:
     - 'main'
  schedule: 
    - cron: 0 9 * * *

env:
  DATA_ARTIFACT_NAME: 'nhl-dashboard-fa-data'

jobs:
  get-data:
    runs-on: ubuntu-latest
    ###
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      #
      - name: Create oauth.json
        env:
          OAUTH_JSON: ${{ secrets.YAHOO_OAUTH_JSON }}
        run: echo "$OAUTH_JSON" > oauth.json
      #
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      #
      - name: Install Requirements
        run: pip install -r requirements.txt
      #
      - name: Gather Data
        env: 
          PYTHONPATH: ${{ github.workspace }}
        run: python3 update_data.py
      #
      - name: Save Output as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DATA_ARTIFACT_NAME }}
          path: ./*csv
          retention-days: 2
          overwrite: true
    ###
